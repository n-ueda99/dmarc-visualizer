services:
  parsedmarc:
    build: ./parsedmarc/
    networks:
      - dmarc_net
    environment:
      - no_proxy=elasticsearch,localhost,127.0.0.1
      - NO_PROXY=elasticsearch,localhost,127.0.0.1
      - http_proxy=http://172.16.1.10:12080
      - https_proxy=http://172.16.1.10:12080
      - no_proxy=localhost,127.0.0.1,elasticsearch,grafana
    volumes:
      - ./input_files:/input_files:rw
      - ./output_files:/output_files:rw
      - ./parsedmarc.ini:/etc/parsedmarc.ini
    command: >
      /bin/sh -c "
      echo '監視を開始します（完全修正版）...';
      while true; do
        find /input -maxdepth 1 -name '*Zone.Identifier' -delete
        
        # 1ファイルずつ確実に解析して移動
        for f in /input/*.xml /input/*.gz /input/*.zip; do
          if [ -f \"\$f\" ]; then
            echo \"解析中: \$f\"
            parsedmarc --skip-dns -c /etc/parsedmarc.ini \"\$f\"
            echo \"移動中: \$f\"
            mv \"\$f\" /output/
          fi
        done
        sleep 30
      done"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.5
    networks:
      - dmarc_net
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - no_proxy=localhost,127.0.0.1
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    networks:
      - dmarc_net
    ports:
      - "3000:3000"
    user: root
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      no_proxy: "elasticsearch,localhost,127.0.0.1"
      NO_PROXY: "elasticsearch,localhost,127.0.0.1"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - elasticsearch

networks:
  dmarc_net:
    driver: bridge

volumes:
  elastic_data:
  grafana_data:
