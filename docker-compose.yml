services:
  parsedmarc:
    build: ./parsedmarc/
    networks:
      - dmarc_net
    environment:
      - no_proxy=elasticsearch,localhost,127.0.0.1
      - NO_PROXY=elasticsearch,localhost,127.0.0.1
      - http_proxy=http://172.16.1.10:12080
      - https_proxy=http://172.16.1.10:12080
    volumes:
      - ./input_files:/input:rw
      - ./processed_files:/processed:rw
      - ./output_files:/output
    command: >
      /bin/sh -c "
      echo '監視を開始します（全機能保持・安定版）...';
      while true; do
        # 1. Zone.Identifier ファイルを強制削除
        find /input -maxdepth 1 -name '*Zone.Identifier' -delete
        
        # 2. .gz と .zip を一括リストアップ（互換性の高い記述に変更）
        find /input -maxdepth 1 -name '*.gz' > /tmp/list.txt
        find /input -maxdepth 1 -name '*.zip' >> /tmp/list.txt
        
        if [ -s /tmp/list.txt ]; then
          echo '一括解析を開始します...'
          # 3. スペース対応の解析実行
          cat /tmp/list.txt | tr '\n' '\0' | xargs -0 parsedmarc -c /parsedmarc.ini --offline
          
          echo '処理を試みたファイルを移動しています...'
          # 4. 1つずつ移動
          while IFS= read -r f; do
            if [ -f \"$$f\" ]; then
              mv \"$$f\" /processed/
            fi
          done < /tmp/list.txt
        fi
        rm -f /tmp/list.txt
        sleep 30
      done"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.5
    networks:
      - dmarc_net
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - no_proxy=localhost,127.0.0.1
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    networks:
      - dmarc_net
    ports:
      - "3000:3000"
    user: root
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      no_proxy: "elasticsearch,localhost,127.0.0.1"
      NO_PROXY: "elasticsearch,localhost,127.0.0.1"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - elasticsearch

networks:
  dmarc_net:
    driver: bridge

volumes:
  elastic_data:
  grafana_data:
